# application.yml — 전 프로파일 공통 골격. (todo.md Day 1)
#
# 모듈러 모노리스라 실행 모듈(bootstrap)은 하나뿐이고, 모든 컨텍스트가 이 설정을 공유한다.
# **환경마다 달라지는 값(접속 주소·계정)은 여기 두지 않는다** → application-local.yml 로 내렸다.
# 이 파일에는 "어느 환경에서든 같아야 하는 결정"만 남긴다.

spring:
  application:
    name: order-platform

  profiles:
    # 학습 프로젝트라 로컬이 사실상 유일한 환경 → 기본 프로파일을 local 로 둔다.
    # (운영 환경이 생긴다면 이 줄을 지우는 게 맞다. 기본값이 로컬을 가리키면
    #  프로파일 지정을 깜빡했을 때 조용히 로컬 DB를 보게 되니까.)
    default: local

  jpa:
    hibernate:
      # 엔티티와 실제 테이블이 어긋나면 부팅을 실패시킨다. create/update 는 스키마를 조용히 바꿔버려
      # "내 로컬에선 되는데"의 근원이 된다. 스키마는 사람이 SQL 로 관리하고, 앱은 검증만 한다.
      # ※ Day 1 현재 엔티티가 0개라 검증할 대상이 없어 그냥 통과한다. Day 2에 엔티티가 생기면 의미가 생긴다.
      ddl-auto: validate
    # 뷰 렌더링까지 영속성 컨텍스트를 열어두는 기능. 커넥션을 오래 붙들고 지연 로딩이 컨트롤러 밖에서
    # 터지게 만들어서 요즘은 끄는 게 정석이다. 우리는 REST(JSON)라 애초에 필요도 없다.
    open-in-view: false

# ─────────────────────────────────────────────────────────────────────────────
# Actuator — Day 1 완료 기준("컨테이너 3개 연결 확인")을 실제로 증명하기 위한 장치.
#
# 왜 필요한가: 그냥 앱을 띄우면 **MySQL만 연결된다.** HikariCP 가 부팅 시 커넥션 풀을 열기 때문이다.
# 반면 Redis 는 아직 그걸 쓰는 코드가 없어서 Spring 이 커넥션을 열 이유가 없다 → 연결 로그도 안 뜬다.
# 즉 "부팅 성공"은 3개 연결의 증거가 못 된다. /actuator/health 는 db·redis 를 실제로 찔러보고 답을 준다.
# (Kafka 는 Spring Boot 가 기본 헬스 인디케이터를 제공하지 않는다 → docker exec 로 따로 확인한다.)
# ─────────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health   # 학습용이라도 필요한 것만 연다.
  endpoint:
    health:
      show-details: always   # 어떤 컴포넌트가 죽었는지 봐야 디버깅이 된다. 로컬 전용 설정.

server:
  port: 8080
