# 컨텍스트별 DataSource 3세트 (ADR-0004 B-2 / A-2: 단일 MySQL 인스턴스 + 스키마 분리).
#   키 이름(url·username·password)은 DataSourceProperties 와 같다 — prefix 만 우리 것이다.
#   driver-class-name 은 적지 않는다: DataSourceProperties 가 URL 에서 추론한다.
#   같은 인스턴스(포트 13306)를 보지만 스키마가 다르고, 각자 자기 EntityManagerFactory 를 갖는다.
#   → 타 스키마 테이블이 EntityManager 에 아예 안 보인다(경계가 규약이 아니라 물리).
datasource:
  order:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/order_schema?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  payment:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/payment_schema?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  inventory:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/inventory_schema?characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    # SQL 로깅은 logback 설정이라 자동설정과 무관하게 그대로 동작한다.
    # (`spring.jpa.properties.hibernate.format_sql` 은 수동 EMF 에 안 먹어 제거했다 — 정렬 없이 한 줄로 찍힌다)
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    com.zaxxer.hikari: DEBUG
