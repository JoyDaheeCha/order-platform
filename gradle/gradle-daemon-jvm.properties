# Gradle 데몬을 실행할 JVM 버전을 고정한다. (Daemon JVM criteria)
#
# 왜 필요한가: 이 머신의 기본 java 는 JDK 25 인데, 본 프로젝트가 쓰는 Gradle 8.14.3 의
# Kotlin DSL 컴파일러는 Java 25 를 파싱하지 못해 터진다("IllegalArgumentException: 25.0.3").
# 따라서 데몬은 Gradle 8.14 가 공식 지원하는 JDK 17 로 실행한다.
#
# ※ 이것은 "Gradle 자체를 돌리는 JVM"일 뿐, 프로젝트 코드는 build.gradle.kts 의
#    toolchain(Java 21)으로 컴파일된다(둘은 별개). 17 은 로컬에 설치돼 있어 추가 다운로드도 없다.
toolchainVersion=17
