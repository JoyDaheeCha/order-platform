# docker-compose.yml — 로컬 개발 인프라 3종. (todo.md Day 1 / design.md §5)
#
# 이 프로젝트는 "모듈러 모노리스 + 컨텍스트별 스키마 격리"다(ADR-0004 A-2).
# 그래서 **MySQL 인스턴스는 하나**고, 격리는 인스턴스가 아니라 스키마로 한다.
#   · DB 인스턴스 분리는 단계 3개짜리 학습 범위엔 오버스펙이라 의식적으로 뺐다(design.md §5).
#
# 사용법:
#   docker compose up -d      # 기동
#   docker compose ps         # 헬스체크 상태 확인 (3개 모두 healthy 여야 함)
#   docker compose down       # 정지 (데이터 유지)
#   docker compose down -v    # 정지 + 볼륨 삭제 (스키마 init SQL을 다시 돌리고 싶을 때)
#
# ⚠️ 호스트 포트를 표준(3306·9092·6379)이 아니라 **1xxxx 대역**으로 배정한 이유:
#   이 맥에는 Homebrew 로 설치된 Kafka(9092)·MariaDB(3306)가 LaunchAgent 로 상시 떠 있고,
#   그중 Kafka 9092 는 **회사 프로젝트의 local 프로파일이 실제로 쓰고 있다**.
#   그래서 이 학습 프로젝트가 포트를 양보한다. 두 가지를 얻는다:
#     · brew 서비스를 끄고 켤 필요가 없다 → 회사 일과 학습이 서로를 방해하지 않는다.
#     · `brew services stop` 은 재부팅하면 LaunchAgent 가 되살려서 충돌이 재발한다. 포트 분리는 재발이 없다.
#   컨테이너 *내부*는 표준 포트를 그대로 쓴다. 바꾸는 건 "호스트에 노출하는 창구"뿐이다.
#
#   호스트에서 보는 주소:  MySQL localhost:13306 · Kafka localhost:19092 · Redis localhost:16379

services:
  # ─────────────────────────────────────────────────────────────────────────
  # MySQL — 주문·결제·재고 3개 스키마를 담는 단일 인스턴스.
  # 스키마 생성은 ./docker/mysql/init/01-schemas.sql 이 담당한다.
  # ─────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: order-platform-mysql
    ports:
      # 호스트 13306 → 컨테이너 3306. 로컬 MariaDB(3306)를 피한다.
      # ※ 이 포트를 3306 으로 되돌리면 앱이 MySQL 컨테이너가 아니라 MariaDB 에 붙어
      #   order_schema 가 엉뚱한 DB 에 생긴다. 조용히 실패하는 종류의 사고다.
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root      # 학습용. 운영이라면 절대 이렇게 두지 않는다.
      TZ: UTC
    command:
      # 애플리케이션은 UTC로 다루고 표시 시점에만 지역 시간대로 바꾸는 게 정석이라 서버도 UTC로 고정.
      - --default-time-zone=+00:00
      # 이모지·다국어를 안전하게 담는 MySQL 8의 권장 조합.
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      # /docker-entrypoint-initdb.d 안의 .sql 은 **데이터 디렉토리가 비어 있을 때만** 실행된다.
      # 즉 한 번 뜬 뒤 이 파일을 고쳐도 반영되지 않는다 → `docker compose down -v` 로 볼륨을 지워야 한다.
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      # 포트가 열리는 것과 "쿼리를 받을 준비가 된 것"은 다르다. MySQL은 부팅에 수십 초가 걸릴 수 있어
      # 포트만 보고 접속하면 실패한다 → 실제 핑으로 준비 완료를 판정한다.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Kafka — 컨텍스트 간 유일한 통신 채널(C-2). KRaft 모드 단일 노드.
  #
  # 📚 Day 1 자문 ②: KRaft 는 주키퍼가 하던 **메타데이터 관리 + 컨트롤러 선출**을 Kafka 자신이 흡수한 것이다.
  #    예전엔 "Kafka를 쓰려면 주키퍼 클러스터를 따로 운영"해야 했다 — 장애 지점도 둘, 운영 지식도 둘.
  #    KRaft 는 그 메타데이터를 Kafka 내부 토픽(__cluster_metadata)에 Raft 합의로 저장한다.
  #    그래서 아래 컨테이너 **하나가 broker 와 controller 를 겸직**한다(KAFKA_PROCESS_ROLES).
  # ─────────────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: order-platform-kafka
    ports:
      # 호스트(= ./gradlew bootRun 으로 뜨는 우리 앱)가 붙는 포트.
      # 19092 인 이유: 9092 는 회사 프로젝트가 쓰는 brew Kafka 가 점유 중이다(파일 상단 주석).
      - "19092:19092"
    environment:
      # --- KRaft 정체성 ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller        # 단일 노드가 둘 다 겸직 (학습용. 운영은 분리 권장)
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093  # Raft 투표자 = 자기 자신 하나
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 클러스터 식별자. 고정해 두면 볼륨을 지우고 다시 떠도 같은 클러스터로 포맷된다.
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg

      # --- 리스너: 여기가 Kafka 로컬 세팅에서 제일 많이 넘어지는 지점 ---
      # 리스너를 왜 두 개 두나? "Kafka에 접속하는 주체"가 두 종류이기 때문이다.
      #   · 컨테이너 네트워크 안에서 부를 땐 주소가  kafka:9092    (서비스 이름으로 DNS가 풀림)
      #   · 호스트(내 맥)에서 부를 땐 주소가        localhost:19092
      # 컨테이너 내부의 9092 는 호스트의 9092(회사 brew Kafka)와 **아무 상관이 없다**.
      # 네트워크 네임스페이스가 다르기 때문 — 컨테이너 안에서는 표준 포트를 그대로 쓴다.
      #
      # 핵심은 ADVERTISED_LISTENERS 다. 클라이언트가 처음 접속하면 브로커가
      # "앞으로 나한테 연결할 땐 이 주소를 써라"라고 **되돌려주는 주소**가 이것이다.
      # 여기에 localhost 하나만 적으면 컨테이너끼리 서로를 못 찾고,
      # kafka 하나만 적으면 호스트 앱이 'kafka' 를 DNS로 못 풀어 접속이 깨진다. 그래서 둘 다 광고한다.
      #
      # ⚠️ 이 머신에선 특히 위험한 함정이 하나 있다:
      #   PLAINTEXT_HOST 를 localhost:19092 가 아니라 localhost:9092 로 광고하면,
      #   우리 앱이 19092 로 접속한 뒤 "9092 로 오라"는 안내를 받고 **회사 Kafka 에 붙어버린다.**
      #   포트를 바꿀 땐 ports 매핑과 advertised 를 반드시 함께 바꿔야 한다.
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT   # 브로커끼리 쓰는 리스너(단일 노드라 실질 의미는 적다)

      # --- 단일 노드용 조정 ---
      # 아래 셋은 기본값이 3이다(= 복제본 3개 요구). 브로커가 1대뿐인데 3을 요구하면
      # 내부 토픽 생성 자체가 실패한다 → 1로 낮춘다. 운영에선 절대 1로 두지 않는다(내구성 상실).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 컨슈머 그룹이 뜰 때 "다른 멤버도 들어오나" 기다리는 시간. 개발 중엔 0이 편하다(리밸런스 즉시).
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # 학습 편의: 없는 토픽에 발행하면 자동 생성. 오타가 조용히 새 토픽이 되는 부작용이 있으니
      # 토픽 이름이 안정된 뒤(Day 2 이후)엔 false 로 바꾸고 명시 생성하는 것도 고려할 것.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # "브로커가 API 요청에 답하는가"를 직접 묻는다. 포트 열림만 보는 것보다 정확하다.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — Day 15 재고 동시성 어댑터 D(분산 락)용. (ADR-0002)
  # Day 1~14 동안은 사실상 쓰지 않지만, 인프라를 한 번에 세워두고 이후엔 건드리지 않는다.
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: order-platform-redis
    ports:
      # 6379 는 지금 비어 있지만, 이 프로젝트 포트를 1xxxx 대역으로 통일해 둔다.
      # ("이 프로젝트 = 1로 시작하는 포트"라는 규칙 하나면 어디에 붙는지 헷갈릴 일이 없다)
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

# 명명 볼륨(named volume) — 컨테이너를 지워도 데이터가 남는다.
# 초기화하려면 `docker compose down -v`.
volumes:
  mysql-data:
  kafka-data:
  redis-data:
